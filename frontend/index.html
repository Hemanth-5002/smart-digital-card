<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Digital Card - Futuristic Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <!-- Animated Deep Space Background -->
    <div class="space-background">
        <div class="stars"></div>
        <div class="nebula-1"></div>
        <div class="nebula-2"></div>
        <div class="particles"></div>
    </div>

    <div class="scanlines"></div>

    <div class="container d-flex flex-column justify-content-center align-items-center vh-100">
        <!-- Floating Holographic Card -->
        <div class="holographic-card shadow-lg p-5 text-center">
            <h1 class="title mb-4">SMART DIGITAL CARD</h1>
            
            <form id="student-login-form">
                <div class="input-container mb-4">
                    <label for="login-usn" class="input-label">REGISTER NUMBER (USN)</label>
                    <input type="text" id="login-usn" class="futuristic-input" placeholder="Enter USN..." required>
                </div>
                
                <div class="input-container mb-4">
                    <label for="login-password" class="input-label">SECURITY PASSWORD</label>
                    <input type="password" id="login-password" class="futuristic-input" placeholder="Enter password..." required>
                </div>
                
                <button type="submit" class="btn-view-id w-100 mb-3">
                    <span class="btn-text">VIEW MY ID CARD</span>
                    <div class="btn-glow"></div>
                </button>
                
                <div id="login-message" class="text-danger small text-center mt-2"></div>
            </form>
            
            <div class="divider mt-4 mb-4"></div>
            
            <a href="admin.html" class="btn-admin-login w-100">ADMIN LOGIN</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
