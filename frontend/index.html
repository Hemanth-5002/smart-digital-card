<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Digital Card - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <div class="container d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="card shadow p-4 text-center" style="width: 100%; max-width: 400px;">
            <h2 class="mb-4 text-primary">Smart Digital Card</h2>
            <form id="student-login-form">
                <div class="mb-3">
                    <input type="text" id="login-usn" class="form-control" placeholder="Enter Register Number (USN)"
                        required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-2">View My ID Card</button>
            </form>
            <hr>
            <a href="admin.html" class="btn btn-outline-secondary w-100">Admin Login</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
