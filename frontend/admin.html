<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smart Digital Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Admin Dashboard</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </nav>
    <div class="container-fluid px-2 px-md-3">
        <div class="row">
            <div class="col-12 col-lg-4 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">Add New Student</div>
                    <div class="card-body">
                        <form id="add-student-form">
                            <input type="hidden" id="form-mode" value="add">
                            <div class="mb-2"><input type="text" id="add-name" class="form-control"
                                    placeholder="Student Name" required></div>
                            <div class="mb-2"><input type="text" id="add-usn" class="form-control"
                                    placeholder="Register Number" required></div>
                            <div class="mb-2"><input type="text" id="add-course" class="form-control"
                                    placeholder="Department (e.g. BCA)" required></div>
                            <div class="mb-2"><input type="text" id="add-attendance" class="form-control"
                                    placeholder="Attendance (%)" value="100%"></div>

                            <div class="mb-2"><input type="text" id="add-library" class="form-control"
                                    placeholder="Library Books Accessed" value="None"></div>
                            <div class="mb-2"><input type="text" id="add-contact" class="form-control"
                                    placeholder="Contact Phone"></div>
                            <div class="mb-2"><input type="email" id="add-email" class="form-control"
                                    placeholder="Contact Email"></div>
                            <div class="mb-2"><label class="form-label mb-0 small">Date of Birth</label><input
                                    type="date" id="add-dob" class="form-control"></div>
                            <div class="mb-2"><input type="text" id="add-marks" class="form-control"
                                    placeholder="Marks / CGPA"></div>
                            <div class="mb-2"><input type="text" id="add-linkedin" class="form-control"
                                    placeholder="LinkedIn Profile Link"></div>
                            <div class="mb-2"><input type="text" id="add-resume" class="form-control"
                                    placeholder="Resume Link (URL)"></div>
                            <div class="mb-2"><input type="text" id="add-github" class="form-control"
                                    placeholder="GitHub Profile (URL)"></div>
                            <div class="mb-2"><input type="text" id="add-marks-10th" class="form-control"
                                    placeholder="10th Marks Card Link (URL)"></div>
                            <div class="mb-2"><input type="text" id="add-marks-puc" class="form-control"
                                    placeholder="PUC Marks Card Link (URL)"></div>
                            <div class="mb-2"><input type="text" id="add-blood-group" class="form-control"
                                    placeholder="Blood Group (e.g. O+)"></div>
                            <div class="mb-2"><input type="text" id="add-emergency-contact" class="form-control"
                                    placeholder="Emergency Contact Number"></div>
                            <div class="mb-2"><input type="text" id="add-skills" class="form-control"
                                    placeholder="Skills (e.g. Python, Java, UI Design)"></div>

                            <div class="mb-2 text-center">
                                <small class="text-primary d-block mb-1">🔑 STUDENT SECURITY</small>
                                <input type="text" id="add-password"
                                    class="form-control text-center fw-bold border-primary" placeholder="Set Password"
                                    value="123456">
                            </div>
                            <div class="mb-2"><label class="form-label mb-0 small">Student Photo</label><input
                                    type="file" id="add-photo" class="form-control" accept="image/*"></div>
                            <div class="mb-3">
                                <select id="add-fees" class="form-control">
                                    <option value="Paid">Fees: Paid</option>
                                    <option value="Pending">Fees: Pending</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Add Student</button>
                        </form>
                        <div id="add-message" class="mt-2 text-center text-danger"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                        <span>Students List</span>
                        <button id="refresh-qrs-btn" class="btn btn-sm btn-light text-primary fw-bold"
                            title="Click this if QR codes don't work">Fix QR Codes</button>
                    </div>
                    <div class="card-body table-responsive">
                        <table class="table table-striped table-hover table-sm">
                            <thead>
                                <tr>
                                    <th>USN</th>
                                    <th>Name</th>
                                    <th>Department</th>
                                    <th>Password</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="students-list">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
